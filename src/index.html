<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Study Timer</title>
    <link rel="stylesheet" href="style/index.css" />
    <link rel="stylesheet" href="style/modal.css" />
    <link rel="stylesheet" href="style/timer.css" />
    <link rel="stylesheet" href="style/heatmap.css" />
    <link rel="stylesheet" href="style/sessionList.css" />
</head>

<body>
    <div id="timerContainer" class="Timer-Container">
        <div id="toggleSessionListButton" class="Toggle-Session-List-Button">
            <svg class="ButtonSVG" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd"

                    d="M8.68965 17.1351H7.47341C6.39395 17.1351 6.01657 17.1421 5.72738 17.218C4.93365 17.4264 4.30088 18.0044 4.02952 18.7558C4.0463 19.1382 4.07259 19.4746 4.11382 19.775C4.22268 20.5683 4.42179 20.9884 4.72718 21.2876C5.03258 21.5868 5.46135 21.7818 6.27103 21.8885C7.10452 21.9983 8.2092 22 9.7931 22H14.2069C15.7908 22 16.8955 21.9983 17.729 21.8885C18.5387 21.7818 18.9674 21.5868 19.2728 21.2876C19.5782 20.9884 19.7773 20.5683 19.8862 19.775C19.9776 19.1088 19.9956 18.2657 19.9991 17.1351H13.1034V20.1417C13.1034 20.4397 13.1034 20.5886 12.9988 20.6488C12.8941 20.709 12.751 20.6424 12.4647 20.5092L11.0939 19.8713C10.9971 19.8262 10.9486 19.8037 10.8966 19.8037C10.8445 19.8037 10.796 19.8262 10.6992 19.8713L9.32842 20.5092C9.04213 20.6424 8.89899 20.709 8.79432 20.6488C8.68965 20.5886 8.68965 20.4397 8.68965 20.1417V17.1351Z"
                    fill="#FFFFFF" />
            </svg>
        </div>
        <div id="timerToggleButton" class="Timer-Toggle-Button">
            <svg class="ButtonSVG" fill="#ffffff" viewBox="0 0 32 32" version="1.1" xmlns="http://www.w3.org/2000/svg">
                <title id="buttonState">Play</title>
                <path id="buttonSVGPath"
                    d="M5.92 24.096q0 1.088 0.928 1.728 0.512 0.288 1.088 0.288 0.448 0 0.896-0.224l16.16-8.064q0.48-0.256 0.8-0.736t0.288-1.088-0.288-1.056-0.8-0.736l-16.16-8.064q-0.448-0.224-0.896-0.224-0.544 0-1.088 0.288-0.928 0.608-0.928 1.728v16.16z">
                </path>
            </svg>
        </div>
        <div id="timer" class="Timer">
            <div id="timerMinutes">00</div>
            <div id="timerSeparator">:</div>
            <div id="timerSeconds">00</div>
        </div>
        <div id="dummyRightButtons" class="Dummy-Right-Buttons"></div>
        <div id="timerStopButton" class="Timer-Stop-Button">
            <svg class="ButtonSVG" fill="#ffffff" viewBox="0 0 32 32" version="1.1" xmlns="http://www.w3.org/2000/svg">
                <title>Stop</title>
                <path
                    d="M5.92 24.096q0 0.832 0.576 1.408t1.44 0.608h16.128q0.832 0 1.44-0.608t0.576-1.408v-16.16q0-0.832-0.576-1.44t-1.44-0.576h-16.128q-0.832 0-1.44 0.576t-0.576 1.44v16.16z">
                </path>
            </svg>
        </div>
        <div id="addResourceButton" class="Add-Resource-Button">
            +
        </div>
    </div>
    <div id="heatmapContainer" class="Heatmap-Container">
        <div id="heatmapMonthLabel" class="Heatmap-Month-Label">
            <div>Jan</div>
            <div>Feb</div>
            <div>Mar</div>
            <div>Apr</div>
            <div>May</div>
            <div>Jun</div>
            <div>Jul</div>
            <div>Aug</div>
            <div>Sep</div>
            <div>Oct</div>
            <div>Nov</div>
            <div>Dec</div>
        </div>
        <div id="heatmapBody" class="Heatmap-Body">
            <div id="heatmapDayLabel" class="Heatmap-Day-Label">
                <div>Sun</div>
                <div>Mon</div>
                <div>Tue</div>
                <div>Wed</div>
                <div>Thu</div>
                <div>Fri</div>
                <div>Sat</div>
            </div>
            <div id="heatmapCellContainer" class="Heatmap-Cell-Container"></div>
        </div>
    </div>
    <div id="sessionListContainer" class="Session-List-Container">
        <div id="sessionListHeaderContainer" class="Session-List-Header-Container">
            <div id="sessionListHeader" class="Session-List-Header">Study Session Log</div>
            <div class="Session-List-Dropdown-Container">
                <div class="Session-List-Dropdown">
                    <select name="sessionListFilter" id="sessionListFilter">
                        <option value="Day">Today</option>
                        <option value="Week">This Week</option>
                        <option value="Month">This Month</option>
                        <option value="Year">This year</option>
                        <option value="All">All time</option>
                    </select>

                </div>
                <div class="Session-List-Dropdown">
                    <select name="sessionListSort" id="sessionListSort">
                        <option value="Recency.ascending">Most Recent</option>
                        <option value="Recency.descending">Least Recent</option>
                        <option value="Duration.ascending">Shortest</option>
                        <option value="Duration.descending">Longest</option>
                    </select>
                </div>
            </div>
        </div>
        <div id="sessionList" class="Session-List">
        </div>
    </div>
    <dialog id="sessionInfoDialog" class="Session-Info-Dialog">
        <div id="sessionInfoDialogInner" class="Session-Info-Dialog-Inner">
            <div id="dialogHeaderContainer" class="Dialog-Header-Container">
                <label id="dialogHeader" class="Dialog-Header">Session Completed!</label>
                <button id="sessionInfoDialogCloseButton" class="Session-Info-Dialog-Close-Button"> X </button>
            </div>
            <div class="Session-Info-Inputs-Container">
                <div id="sessionInfoGroupDate" class="Session-Info-Group">
                    <label>Date:</label>
                    <input id="sessionDate" class="Session-Info-Input" readonly></input>
                </div>
                <div id="sessionInfoGroupTitle" class="Session-Info-Group">
                    <label>Title:</label>
                    <input id="sessionTitle" class="Session-Info-Input"></input>
                </div>
                <div id="sessionInfoGroupTag" class="Session-Info-Group">
                    <div class="Session-Tags-List-Label-Container">
                        <label>Tag:</label>
                        <div class="Add-Session-Tag-Container">
                            <input id="addSessionTagInput" class="Add-Session-Tag-Input" />
                            <div id="addSessionTagButton" class="Add-Session-Tag-Button">+</div>
                        </div>
                    </div>
                    <div id="sessionTagsList"></div>
                </div>
                <div id="sessionInfoGroupDescription" class="Session-Info-Group">
                    <label>Description:</label>
                    <textarea id="sessionDescription" class="Session-Info-Input"></textarea>
                </div>
                <div id="sessionInfoGroupResources" class="Session-Info-Group">
                    <label>Resources:</label>
                    <textarea id="sessionResources" class="Session-Info-Input"></textarea>
                </div>
                <button id="sessionInfoSaveButton" class="Session-Info-Save-Button">Save Session</button>
            </div>
        </div>
    </dialog>

</body>

<script src="scripts/index.js" type="module"></script>

</html>
